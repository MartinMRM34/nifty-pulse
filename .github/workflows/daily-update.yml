name: Daily NSE Data Fetch

on:
  schedule:
    # 12:30 UTC = 6:00 PM IST Monday-Friday
    - cron: '30 12 * * 1-5'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Data Fetch Script
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
        # Paths are now relative to the repository root (nifty-pulse)
        run: python scripts/update_data.py

      - name: Trigger Vercel cache revalidation
        env:
          VERCEL_REVALIDATE_URL: ${{ secrets.VERCEL_REVALIDATE_URL }}
          REVALIDATE_SECRET: ${{ secrets.REVALIDATE_SECRET }}
        run: |
          if [ -n "$VERCEL_REVALIDATE_URL" ]; then
            curl -X POST "$VERCEL_REVALIDATE_URL" -H "x-revalidate-secret: $REVALIDATE_SECRET"
            echo "Cache revalidation triggered."
          else
            echo "No revalidation URL set, skipping."
          fi
